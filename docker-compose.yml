services:
  postgres:
    image: postgres:16
    container_name: pinnacle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinnacle
      POSTGRES_PASSWORD: pinnacle
      POSTGRES_DB: pinnacle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16
    container_name: pinnacle-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pinnacle_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pinnacle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  postgres_test_data:
